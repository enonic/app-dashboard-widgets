<div>
  <link rel="stylesheet" href="{{stylesUri}}" type="text/css" media="all"/>
  <div class="issues-container">
    {{#issues}}
    <div class="issue">
        <div class="issue__iconblock">
          <img class="issue__img" src="{{imgUrl}}">
        </div>
        <div class="issue__data">
          <div class="issue__name"><a class="issue__link" href="{{issueUrl}}" target="_blank">{{name}}</a></div>
          <div class="issue__modified">{{modifiedText}} in <a class="issue__link project__name" href="{{projectUrl}}" target="_blank">{{projectDisplayName}}</a></div>
        </div>
    </div>
    {{/issues}}
    {{^issues}}
    <div class="no-items">
      You don't have any open issues
    </div>
    {{/issues}}

  </div>
</div>
